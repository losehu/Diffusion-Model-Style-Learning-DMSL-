env_name: "task_steering"

char_file: "data/assets/go2/go2.xml"
camera_mode: "track"

episode_length: 20.0 # seconds
global_obs: False
root_height_obs: True
pose_termination: False
enable_phase_obs: False
enable_tar_obs: False
disc_dof_vel_obs: False
num_disc_obs_steps: 10
rand_reset: True

ref_char_offset: [2.0, 0.0, 0.0] # m
init_pose: [0, 0, 0.27, 0, 0, 0, 0, 0.9, -1.8, 0, 0.9, -1.8, 0, 0.9, -1.8, 0, 0.9, -1.8]

enable_early_termination: True
key_bodies: ["FR_foot", "FL_foot", "RR_foot", "RL_foot"]
contact_bodies: ["FR_foot", "FL_foot", "RR_foot", "RL_foot"]

rand_tar_dir: True
rand_face_dir: False
tar_speed_min: 0.5
tar_speed_max: 5.0
tar_change_time_min: 4.0
tar_change_time_max: 7.0

motion_file: "data/motions/go2/go2_apex_trot_clean.pkl"

reward_steering_tar_w: 0.7
reward_steering_face_w: 0.3
reward_steering_vel_scale: 0.5

engine:
  ground_contact_height: 0.15 # this is needed for IsaacGym
